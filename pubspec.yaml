name: my_video_player
description: A modern Material 3 DASH Video Player app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  video_player: ^2.9.0
  screen_brightness: ^1.0.1
  flutter_volume_controller: ^1.0.3
  lucide_flutter: ^1.23.0
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  xml: ^6.5.0
  http: ^1.2.0
  wakelock_plus: ^1.2.0
  path_provider: ^2.1.4
  gal: ^2.3.0
  flutter_local_notifications: ^17.2.2
  sensors_plus: ^6.0.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
